<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Observer</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100vw; height:100vh;
      background:#000;
      overflow:hidden;
      cursor:none;
      font-family:'Share Tech Mono',monospace;
      user-select:none;
    }

    /* ─── INTRO SCREEN ─── */
    #intro {
      position:fixed; inset:0;
      background:#000;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:200;
      transition: opacity 1s ease;
    }
    #intro.fade-out { opacity:0; pointer-events:none; }

    #eye-container {
      position:relative;
      width:480px; height:480px;
    }
    #eye-container img {
      position:absolute; inset:0;
      width:100%; height:100%;
      image-rendering:pixelated;
    }
    #intro-front { z-index:2; }
    #intro-pupil { z-index:3; }
    #intro-lid   { z-index:4; pointer-events:none; }

    #intro-text {
      margin-top:32px;
      font-size:0.6rem;
      letter-spacing:0.4em;
      text-transform:uppercase;
      color:rgba(200,30,30,0.5);
      opacity:0;
      transition: opacity 1s ease;
    }
    #intro-text.show { opacity:1; }

    /* ─── GAME CANVAS ─── */
    #game-layer {
      position:fixed; inset:0;
      opacity:0;
      transition: opacity 1.2s ease;
      pointer-events:none;
    }
    #game-layer.show {
      opacity:1;
      pointer-events:auto;
    }

    #game-canvas {
      display:block;
      width:100%; height:100%;
    }

    /* ─── HUD ─── */
    #hud {
      position:fixed;
      top:16px; left:50%;
      transform:translateX(-50%);
      display:flex; flex-direction:column;
      align-items:center;
      gap:6px;
      z-index:50;
      pointer-events:none;
      opacity:0;
      transition:opacity 0.5s;
    }
    #hud.show { opacity:1; }

    #exposure-bar-wrap {
      width:320px; height:7px;
      border:1px solid rgba(200,30,30,0.3);
      border-radius:3px;
      overflow:hidden;
    }
    #exposure-bar {
      height:100%;
      width:0%;
      background:linear-gradient(90deg, rgba(200,30,30,0.4), rgba(255,60,30,0.9));
      transition:background 0.2s;
      border-radius:3px;
    }
    #exposure-bar.danger { background:linear-gradient(90deg,#ff2200,#ff6600); }
    #exposure-label {
      font-size:0.5rem;
      letter-spacing:0.3em;
      text-transform:uppercase;
      color:rgba(200,30,30,0.6);
    }
    #shrink-warn {
      font-size:0.42rem;
      letter-spacing:0.3em;
      text-transform:uppercase;
      color:rgba(255,120,0,0);
      transition:color 0.4s;
      pointer-events:none;
    }
    #shrink-warn.active { color:rgba(255,120,0,0.85); }

    /* ─── DEATH SCREEN ─── */
    #death-screen {
      position:fixed; inset:0;
      background:#000;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px;
      z-index:300;
      opacity:0;
      pointer-events:none;
      transition:opacity 1s ease;
    }
    #death-screen.show {
      opacity:1;
      pointer-events:auto;
    }
    #death-title {
      font-size:1.2rem;
      letter-spacing:0.5em;
      text-transform:uppercase;
      color:rgba(200,20,20,0.9);
      text-shadow: 0 0 20px rgba(255,0,0,0.5);
    }
    #death-sub {
      font-size:0.5rem;
      letter-spacing:0.3em;
      color:rgba(150,0,0,0.7);
    }
    #death-redirect {
      font-size:0.45rem;
      letter-spacing:0.2em;
      color:rgba(100,0,0,0.5);
    }

    /* Custom cursor: mouse dot */
    #cursor-dot {
      position:fixed;
      width:10px; height:10px;
      background:rgba(0,200,255,0.8);
      border-radius:50%;
      pointer-events:none;
      z-index:9999;
      transform:translate(-50%,-50%);
      box-shadow: 0 0 8px rgba(0,200,255,0.6);
      transition: background 0.3s;
    }
    #cursor-dot.hidden-mode {
      background:rgba(0,200,255,0.2);
      box-shadow:0 0 4px rgba(0,200,255,0.1);
    }
  </style>
</head>

<script>
/* ============================================================
   THE OBSERVER — VERSÃO DIFÍCIL
   Mesma mecânica: esconde o rato nas sombras.
   Novidades:
   - Observer 3× maior (480px)
   - Raios de scan rotativos que te apanham mesmo nas sombras
   - Sombras encolhem com o tempo (aviso visual antes)
   - 2º observer aparece aos 20s
   - Exposição sobe muito mais depressa quanto mais perto estás
   - Modo CAÇA: quando te vê, acelera a fundo + spin frenético
   - Modo PATRULHA: quando estás escondido, faz padrão circular
   ============================================================ */

// ── DOM ──
const introEl    = document.getElementById('intro');
const introFront = document.getElementById('intro-front');
const introPupil = document.getElementById('intro-pupil');
const introLid   = document.getElementById('intro-lid');
const gameLayer  = document.getElementById('game-layer');
const gameCanvas = document.getElementById('game-canvas');
const gCtx       = gameCanvas.getContext('2d');
const hud        = document.getElementById('hud');
const expBar     = document.getElementById('exposure-bar');
const shrinkWarn = document.getElementById('shrink-warn');
const deathScreen= document.getElementById('death-screen');
const cursorDot  = document.getElementById('cursor-dot');
const sprClose   = document.getElementById('spr-close');
const sprOpen    = document.getElementById('spr-open');
const sprRedF    = document.getElementById('spr-red-front');
const sprRedP    = document.getElementById('spr-red-pupil');
const sprBluF    = document.getElementById('spr-blu-front');
const sprBluP    = document.getElementById('spr-blu-pupil');

const W = () => gameCanvas.width;
const H = () => gameCanvas.height;

// ── Input ──
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursorDot.style.left = mouseX+'px'; cursorDot.style.top = mouseY+'px';
});

// ── Canvas ──
function resizeGame() { gameCanvas.width=window.innerWidth; gameCanvas.height=window.innerHeight; }
resizeGame();
window.addEventListener('resize', resizeGame);

// ── INTRO ──
const CLOSE_FRAMES=8, OPEN_FRAMES=13;
const lidCtx = introLid.getContext('2d');
let introSpinRaf=null, introSpinAngle=0;

function drawLidFrame(img,frame,total) {
  const fw=img.naturalWidth/total;
  lidCtx.clearRect(0,0,480,480);
  lidCtx.drawImage(img, frame*fw,0, fw,img.naturalHeight, 0,0,480,480);
}
function startIntroSpin() {
  function spin(){ introSpinAngle=(introSpinAngle+1.2)%360; introFront.style.transform='rotate('+introSpinAngle+'deg)'; introSpinRaf=requestAnimationFrame(spin); }
  spin();
}
function runOpenAnim() {
  drawLidFrame(sprClose,CLOSE_FRAMES-1,CLOSE_FRAMES);
  startIntroSpin();
  setTimeout(()=>{
    let f=0; const iv=setInterval(()=>{
      drawLidFrame(sprOpen,f,OPEN_FRAMES); f++;
      if(f>=OPEN_FRAMES){ clearInterval(iv); lidCtx.clearRect(0,0,480,480); setTimeout(transitionToGame,400); }
    },80);
  },600);
}
function transitionToGame() {
  cancelAnimationFrame(introSpinRaf);
  introEl.classList.add('fade-out');
  gameLayer.classList.add('show');
  hud.classList.add('show');
  setTimeout(()=>{ introEl.style.display='none'; gameRunning=true; requestAnimationFrame(gameLoop); },1000);
}

// ── SHELTERS ──
// life: 1.0→0, encolhe com o tempo; shrinkStartMs = quando começa a encolher
function makeShelters() {
  return [
    { type:'cave', x:0.05, y:0.70, w:0.13, h:0.21, life:1, shrinkStart:18000 },
    { type:'cave', x:0.82, y:0.65, w:0.14, h:0.23, life:1, shrinkStart:25000 },
    { type:'cave', x:0.40, y:0.78, w:0.15, h:0.19, life:1, shrinkStart:32000 },
    { type:'cave', x:0.20, y:0.12, w:0.11, h:0.16, life:1, shrinkStart:14000 },
    { type:'cave', x:0.72, y:0.10, w:0.12, h:0.15, life:1, shrinkStart:22000 },
    { type:'rock', x:0.28, y:0.55, w:0.09, h:0.11, life:1, shrinkStart:10000 },
    { type:'rock', x:0.60, y:0.50, w:0.10, h:0.11, life:1, shrinkStart:15000 },
    { type:'rock', x:0.12, y:0.42, w:0.08, h:0.10, life:1, shrinkStart:19000 },
    { type:'rock', x:0.80, y:0.38, w:0.09, h:0.10, life:1, shrinkStart:12000 },
    { type:'rock', x:0.48, y:0.35, w:0.08, h:0.09, life:1, shrinkStart:28000 },
    { type:'rock', x:0.35, y:0.20, w:0.09, h:0.11, life:1, shrinkStart:20000 },
    { type:'rock', x:0.62, y:0.28, w:0.09, h:0.10, life:1, shrinkStart:16000 },
  ];
}
let shelters = makeShelters();
const SHRINK_RATE = 1/12000; // perde toda a vida em 12s após começar

function getShelterAbs(s) {
  // Scale shelter from centre based on life
  const cx=s.x+s.w/2, cy=s.y+s.h/2;
  const sw=s.w*s.life, sh=s.h*s.life;
  return { type:s.type, x:(cx-sw/2)*W(), y:(cy-sh/2)*H(), w:sw*W(), h:sh*H(), life:s.life };
}

function isInShelter(mx,my) {
  for(const s of shelters) {
    if(s.life<0.04) continue;
    const a=getShelterAbs(s);
    if(s.type==='cave') {
      const ex=(mx-(a.x+a.w/2))/(a.w/2||1);
      const ey=(my-(a.y+a.h/2))/(a.h/2||1);
      if(ex*ex+ey*ey<=1) return true;
    } else {
      if(mx>=a.x&&mx<=a.x+a.w&&my>=a.y&&my<=a.y+a.h) return true;
    }
  }
  return false;
}

// ── OBSERVERS ──
// Cada observer: { x, y, angle, speed, moveAngle, moveTimer, phase, puOffX, puOffY, scanAngle, patrolAngle, patrolR }
const OBS_SIZE = 480;

function makeObserver(x,y) {
  return {
    x,y, angle:Math.random()*360, speed:0,
    moveAngle:Math.random()*Math.PI*2, moveTimer:0,
    phase:'calm',
    puOffX:0, puOffY:0,
    scanAngle:Math.random()*360,   // rotating scan beam
    patrolCX:x, patrolCY:y,        // patrol orbit centre
    patrolAngle:Math.random()*Math.PI*2,
    patrolR:0.12,                  // orbit radius (normalised)
    patrolMode:false,
  };
}

let observers = [];
let gameTime = 0; // ms elapsed since game start
let secondObserverSpawned = false;

function initObservers() {
  observers = [ makeObserver(0.5, 0.5) ];
  secondObserverSpawned = false;
}

// ── EXPOSURE ──
let exposure=0;
const BASE_FILL  = 1/4500;  // faster than before
const BASE_DRAIN = 1/550;

// ── STATE ──
let gameRunning=false, dead=false, lastTs=null;

// ── GAME LOOP ──
function gameLoop(ts) {
  if(!gameRunning||dead) return;
  if(!lastTs) lastTs=ts;
  const dt=Math.min(ts-lastTs,50);
  lastTs=ts;
  gameTime+=dt;

  const cw=W(), ch=H();
  const hidden=isInShelter(mouseX,mouseY);

  // ── Spawn second observer at 20s ──
  if(!secondObserverSpawned && gameTime>20000) {
    secondObserverSpawned=true;
    // Spawn far from player
    const sx = mouseX/cw < 0.5 ? 0.85 : 0.15;
    const sy = mouseY/ch < 0.5 ? 0.85 : 0.15;
    observers.push(makeObserver(sx,sy));
  }

  // ── Shrink shelters ──
  let anyShrinking=false;
  for(const s of shelters) {
    if(gameTime>s.shrinkStart && s.life>0) {
      s.life=Math.max(0, s.life-SHRINK_RATE*dt);
      if(s.life>0) anyShrinking=true;
    }
  }
  shrinkWarn.classList.toggle('active', anyShrinking);

  // ── Exposure ──
  // Sobe mais depressa quanto mais perto o observer mais próximo estiver
  let seen=false, nearDist=999;
  for(const obs of observers) {
    const dx=mouseX/cw-obs.x, dy=mouseY/ch-obs.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<nearDist) nearDist=d;
    // Scan beam hit — mesmo escondido sofres exposição parcial
    if(isInScanBeam(obs,mouseX,mouseY,cw,ch)) seen=true;
    if(!hidden) seen=true;
  }

  const proxFactor = hidden ? 1 : Math.max(0.4, 1.8-nearDist*2); // closer = faster
  if(seen) {
    exposure=Math.min(1, exposure+BASE_FILL*dt*proxFactor);
  } else {
    exposure=Math.max(0, exposure-BASE_DRAIN*dt);
  }

  expBar.style.width=(exposure*100).toFixed(0)+'%';
  expBar.classList.toggle('danger',exposure>0.65);
  cursorDot.classList.toggle('hidden-mode', hidden&&!seen);

  if(exposure>=1){ triggerDeath(); return; }

  // ── Update each observer ──
  for(const obs of observers) {
    // Scan beam rotates — faster when hunting
    const isHunt = obs.phase==='hunt';
    obs.scanAngle=(obs.scanAngle+(isHunt?1.4+exposure*3:0.7))%360;

    // Phase
    if(!hidden) {
      obs.phase='hunt';
      obs.patrolMode=false;
    } else {
      // Stays hunt for 2s after losing sight
      if(!obs._lostSightTimer) obs._lostSightTimer=0;
      if(obs.phase==='hunt') { obs._lostSightTimer+=dt; if(obs._lostSightTimer>2000){ obs.phase='calm'; obs._lostSightTimer=0; } }
      else obs._lostSightTimer=0;
    }

    if(obs.phase==='calm') {
      // Patrol: orbit around last known area
      obs.patrolMode=true;
      obs.patrolAngle=(obs.patrolAngle+0.0006*dt)%(Math.PI*2);
      const tx=obs.patrolCX+Math.cos(obs.patrolAngle)*obs.patrolR;
      const ty=obs.patrolCY+Math.sin(obs.patrolAngle)*obs.patrolR;
      obs.x+=(tx-obs.x)*0.012;
      obs.y+=(ty-obs.y)*0.012;
    } else {
      // Hunt: aggressive pursuit
      obs.patrolCX=mouseX/cw; obs.patrolCY=mouseY/ch; // update last known pos
      obs.moveTimer-=dt;
      if(obs.moveTimer<=0) {
        const px=mouseX/cw, py=mouseY/ch;
        const toP=Math.atan2(py-obs.y,px-obs.x);
        const bias=0.82;
        obs.moveAngle=toP+(Math.random()-0.5)*Math.PI*2*(1-bias);
        obs.moveTimer=250+Math.random()*350;
      }
      const tSpeed=0.00022+exposure*0.0003;
      obs.speed+=(tSpeed-obs.speed)*0.04;
      obs.x+=Math.cos(obs.moveAngle)*obs.speed*dt;
      obs.y+=Math.sin(obs.moveAngle)*obs.speed*dt;
    }

    // Bounce
    if(obs.x<0.04){obs.x=0.04;obs.moveAngle=Math.PI-obs.moveAngle;}
    if(obs.x>0.96){obs.x=0.96;obs.moveAngle=Math.PI-obs.moveAngle;}
    if(obs.y<0.04){obs.y=0.04;obs.moveAngle=-obs.moveAngle;}
    if(obs.y>0.96){obs.y=0.96;obs.moveAngle=-obs.moveAngle;}

    // Spin
    obs.angle=(obs.angle+(isHunt?2.5+exposure*6:0.5))%360;

    // Pupil tracks mouse
    const ox=obs.x*cw, oy=obs.y*ch;
    const ddx=mouseX-ox, ddy=mouseY-oy;
    const dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;
    const maxShift=22;
    const ratio=Math.min(dd,260)/260;
    obs.puOffX+=(ddx/dd*ratio*maxShift-obs.puOffX)*0.1;
    obs.puOffY+=(ddy/dd*ratio*maxShift-obs.puOffY)*0.1;
  }

  // ── DRAW ──
  gCtx.clearRect(0,0,cw,ch);
  gCtx.fillStyle='#000'; gCtx.fillRect(0,0,cw,ch);

  // Scan beams (removido para ter observer mais limpo)
  // for(const obs of observers) drawScanBeams(obs,cw,ch);

  // Observers behind shelters
  for(const obs of observers) drawObserver(obs.x*cw,obs.y*ch,obs);

  // Shelters on top
  drawShelters(cw,ch);

  // Vignette
  drawVignette(cw,ch,exposure,hidden&&!seen);

  // Player hint when hidden
  if(hidden&&!seen) {
    gCtx.strokeStyle='rgba(0,200,255,0.28)';
    gCtx.lineWidth=1;
    gCtx.beginPath();
    gCtx.arc(mouseX,mouseY,20,0,Math.PI*2);
    gCtx.stroke();
  }

  requestAnimationFrame(gameLoop);
}

// ── SCAN BEAM ──
function isInScanBeam(obs,mx,my,cw,ch) {
  const ox=obs.x*cw, oy=obs.y*ch;
  const beamLen=Math.min(cw,ch)*0.42;
  const halfDeg=15;
  // Two beams, 180° apart
  for(let b=0;b<2;b++) {
    const ang=(obs.scanAngle+b*180)*Math.PI/180;
    const dx=mx-ox, dy=my-oy;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>beamLen) continue;
    const dot=(dx*Math.cos(ang)+dy*Math.sin(ang))/d;
    const diff=Math.acos(Math.min(1,Math.max(-1,dot)))*180/Math.PI;
    if(diff<halfDeg) return true;
  }
  return false;
}

function drawScanBeams(obs,cw,ch) {
  const ox=obs.x*cw, oy=obs.y*ch;
  const beamLen=Math.min(cw,ch)*0.42;
  const halfRad=15*Math.PI/180;
  const isHunt=obs.phase==='hunt';
  for(let b=0;b<2;b++) {
    const ang=(obs.scanAngle+b*180)*Math.PI/180;
    const a1=ang-halfRad, a2=ang+halfRad;
    gCtx.save();
    gCtx.beginPath();
    gCtx.moveTo(ox,oy);
    gCtx.arc(ox,oy,beamLen,a1,a2);
    gCtx.closePath();
    // Gradient along the beam
    const grad=gCtx.createRadialGradient(ox,oy,0,ox,oy,beamLen);
    if(isHunt) {
      grad.addColorStop(0,'rgba(255,40,0,0.18)');
      grad.addColorStop(0.5,'rgba(255,40,0,0.06)');
      grad.addColorStop(1,'rgba(255,40,0,0)');
    } else {
      grad.addColorStop(0,'rgba(0,160,255,0.10)');
      grad.addColorStop(0.5,'rgba(0,160,255,0.03)');
      grad.addColorStop(1,'rgba(0,160,255,0)');
    }
    gCtx.fillStyle=grad;
    gCtx.fill();
    // Edge lines
    gCtx.beginPath();
    gCtx.moveTo(ox,oy);
    gCtx.lineTo(ox+Math.cos(a1)*beamLen,oy+Math.sin(a1)*beamLen);
    gCtx.moveTo(ox,oy);
    gCtx.lineTo(ox+Math.cos(a2)*beamLen,oy+Math.sin(a2)*beamLen);
    gCtx.strokeStyle=isHunt?'rgba(255,80,0,0.22)':'rgba(0,180,255,0.12)';
    gCtx.lineWidth=1;
    gCtx.stroke();
    gCtx.restore();
  }
}

// ── DRAW OBSERVER ──
function drawObserver(ox,oy,obs) {
  const size=OBS_SIZE;
  const isHunt=obs.phase==='hunt';
  gCtx.save();
  gCtx.translate(ox,oy);

  // Outer glow — huge
  const glowR=size*0.75;
  const g=gCtx.createRadialGradient(0,0,0,0,0,glowR);
  g.addColorStop(0, isHunt?'rgba(200,20,0,0.22)':'rgba(0,140,255,0.14)');
  g.addColorStop(1,'transparent');
  gCtx.fillStyle=g;
  gCtx.beginPath(); gCtx.arc(0,0,glowR,0,Math.PI*2); gCtx.fill();

  // Spinning front ring
  gCtx.save();
  gCtx.rotate(obs.angle*Math.PI/180);
  gCtx.drawImage(isHunt?sprRedF:sprBluF,-size/2,-size/2,size,size);
  gCtx.restore();

  // Pupil (tracks mouse)
  gCtx.drawImage(isHunt?sprRedP:sprBluP,-size/2+obs.puOffX,-size/2+obs.puOffY,size,size);

  gCtx.restore();
}

// ── DRAW SHELTERS ──
function drawShelters(cw,ch) {
  const now=Date.now();
  for(const s of shelters) {
    if(s.life<0.02) continue;
    const a=getShelterAbs(s);
    const dying=s.life<0.30;
    // Pulsing warning when nearly gone
    const pulse=dying?(0.55+0.45*Math.sin(now*0.007)):1;

    gCtx.save();
    gCtx.globalAlpha=Math.min(1,s.life*2.5)*pulse;

    if(s.type==='cave') {
      gCtx.fillStyle='#000';
      gCtx.beginPath();
      gCtx.ellipse(a.x+a.w/2,a.y+a.h/2,a.w/2,a.h/2,0,0,Math.PI*2);
      gCtx.fill();
      gCtx.strokeStyle=dying?`rgba(255,80,0,0.65)`:'rgba(80,20,20,0.6)';
      gCtx.lineWidth=dying?2.5:2;
      gCtx.beginPath();
      gCtx.ellipse(a.x+a.w/2,a.y+a.h/2,a.w/2,a.h/2,0,0,Math.PI*2);
      gCtx.stroke();
    } else {
      const rx=a.x+a.w/2,ry=a.y+a.h/2;
      gCtx.fillStyle='#000';
      gCtx.beginPath();
      gCtx.moveTo(rx-a.w*0.4,ry+a.h*0.4);
      gCtx.lineTo(rx-a.w*0.5,ry-a.h*0.1);
      gCtx.lineTo(rx-a.w*0.1,ry-a.h*0.5);
      gCtx.lineTo(rx+a.w*0.3,ry-a.h*0.4);
      gCtx.lineTo(rx+a.w*0.5,ry+a.h*0.1);
      gCtx.lineTo(rx+a.w*0.2,ry+a.h*0.4);
      gCtx.closePath(); gCtx.fill();
      gCtx.strokeStyle=dying?'rgba(255,70,0,0.55)':'rgba(70,20,20,0.5)';
      gCtx.lineWidth=dying?2:1.5; gCtx.stroke();
    }
    gCtx.restore();
  }
}

function drawVignette(cw,ch,exp,safelyHidden) {
  if(exp<0.08) return;
  const alpha=safelyHidden?exp*0.14:exp*0.44;
  const g=gCtx.createRadialGradient(cw/2,ch/2,ch*0.18,cw/2,ch/2,ch*0.82);
  g.addColorStop(0,'transparent');
  g.addColorStop(1,`rgba(180,0,0,${alpha.toFixed(2)})`);
  gCtx.fillStyle=g; gCtx.fillRect(0,0,cw,ch);
  if(exp>0.72){
    const p=0.06*Math.sin(Date.now()*0.009)+0.06;
    gCtx.fillStyle=`rgba(200,0,0,${p.toFixed(3)})`; gCtx.fillRect(0,0,cw,ch);
  }
}

// ── DEATH ──
function triggerDeath() {
  gameRunning=false; dead=true;
  let fl=0;
  const iv=setInterval(()=>{
    gCtx.fillStyle='rgba(255,0,0,0.16)'; gCtx.fillRect(0,0,W(),H());
    if(++fl>6){ clearInterval(iv); drawDeathExplosion();
      setTimeout(()=>{ deathScreen.classList.add('show');
        setTimeout(()=>{ window.location.href='../index.html'; },2200); },600); }
  },80);
}

function drawDeathExplosion() {
  const cx=mouseX,cy=mouseY; let t=0;
  function frame(){
    t+=0.055; if(t>1) return;
    gCtx.clearRect(0,0,W(),H()); gCtx.fillStyle='#000'; gCtx.fillRect(0,0,W(),H());
    for(const obs of observers) drawObserver(obs.x*W(),obs.y*H(),obs);
    drawShelters(W(),H());
    for(let i=0;i<32;i++){
      const a=(i/32)*Math.PI*2,r=t*110;
      gCtx.fillStyle=`rgba(0,200,255,${(1-t).toFixed(2)})`;
      gCtx.beginPath(); gCtx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,4*(1-t),0,Math.PI*2); gCtx.fill();
    }
    gCtx.strokeStyle=`rgba(220,0,0,${(1-t).toFixed(2)})`; gCtx.lineWidth=2;
    gCtx.beginPath(); gCtx.arc(cx,cy,t*150,0,Math.PI*2); gCtx.stroke();
    requestAnimationFrame(frame);
  }
  frame();
}

// ── INIT ──
let spritesLoaded=0;
function onSpriteLoad(){ if(++spritesLoaded>=6){ initObservers(); runOpenAnim(); } }
[sprClose,sprOpen,sprRedF,sprRedP,sprBluF,sprBluP].forEach(img=>{
  if(img.complete) onSpriteLoad(); else img.addEventListener('load',onSpriteLoad);
});
</script>
